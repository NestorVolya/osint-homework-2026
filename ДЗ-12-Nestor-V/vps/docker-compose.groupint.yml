services:
  neo4j:
    container_name: groupint-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_bolt_listen__address=:7687
      - NEO4J_server_http_listen__address=:7474
      - NEO4J_server_bolt_advertised__address=srv1621610.hstgr.cloud:17687
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*
    ports:
      - "17687:7687"
    volumes:
      - groupint-neo4j-data:/data
      - groupint-neo4j-logs:/logs
      - groupint-neo4j-import:/var/lib/neo4j/import
      - groupint-neo4j-plugins:/plugins
    labels:
      - traefik.enable=true
      - traefik.http.routers.groupint-neo4j.rule=Host(`neo4j-groupint.srv1621610.hstgr.cloud`)
      - traefik.http.routers.groupint-neo4j.entrypoints=websecure
      - traefik.http.routers.groupint-neo4j.tls.certresolver=letsencrypt
      - traefik.http.routers.groupint-neo4j.middlewares=groupint-basic-auth
      - traefik.http.services.groupint-neo4j.loadbalancer.server.port=7474

  streamlit:
    container_name: groupint-streamlit
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=srv1621610.hstgr.cloud
      - APP_NAME=groupint
      - NEO4J_URI=bolt://groupint-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GROUPINT_SESSIONS_DIR=/home/appuser/.groupint/sessions
      - NEO4J_BROWSER_URL=https://neo4j-groupint.srv1621610.hstgr.cloud/browser/
      - NEO4J_BROWSER_CONNECT_URL=neo4j://srv1621610.hstgr.cloud:17687
      - NEO4J_BROWSER_DATABASE=neo4j
      - NEO4J_BROWSER_AUTH_METHOD=BASIC
      - INCIDENT_LLM_PROVIDER=${INCIDENT_LLM_PROVIDER:-anthropic}
      - INCIDENT_LLM_MODEL=${INCIDENT_LLM_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - ATLOS_BASE_URL=${ATLOS_BASE_URL:-}
      - ATLOS_API_TOKEN=${ATLOS_API_TOKEN:-}
    volumes:
      - .:/app
      - groupint-telegram-session:/home/appuser/.groupint
    depends_on:
      - neo4j
    labels:
      - traefik.enable=true
      - traefik.http.routers.groupint.rule=Host(`groupint.srv1621610.hstgr.cloud`)
      - traefik.http.routers.groupint.entrypoints=websecure
      - traefik.http.routers.groupint.tls.certresolver=letsencrypt
      - traefik.http.routers.groupint.middlewares=groupint-basic-auth
      - traefik.http.middlewares.groupint-basic-auth.basicauth.users=${GROUPINT_BASIC_AUTH}
      - traefik.http.services.groupint.loadbalancer.server.port=8501
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  groupint-telegram-session:
  groupint-neo4j-data:
  groupint-neo4j-logs:
  groupint-neo4j-import:
  groupint-neo4j-plugins:
