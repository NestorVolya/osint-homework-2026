# =============================================================================
# OSINT Stack — ДЗ-03 (Просунутий рівень)
#
# Архітектура:
#
#   ┌──────────────┐     ┌──────────────┐     ┌──────────────┐
#   │ ArkhamMirror │────▶│  PostgreSQL  │◀────│   MindsDB    │
#   │  :8100       │     │  :5432       │     │  :47334      │
#   └──────────────┘     └──────────────┘     └──────────────┘
#          │                                         │
#          └─────────────────┬───────────────────────┘
#                            │
#                     ┌──────▼──────┐
#                     │   Ollama    │
#                     │ (на хості)  │
#                     │ :11434      │
#                     └─────────────┘
#
# Запуск: docker compose -f docker-compose.osint.yml up -d
# =============================================================================

name: osint-stack

networks:
  osint-net:
    name: osint-network
    driver: bridge

volumes:
  arkham_postgres_data:
    name: osint_postgres_data
  arkham_datasilo:
    name: osint_datasilo
  mindsdb_data:
    name: osint_mindsdb_data

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — спільна шина даних для Arkham і MindsDB
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: osint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arkham
      POSTGRES_PASSWORD: arkhampass
      POSTGRES_DB: arkhamdb
    volumes:
      - arkham_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkham -d arkhamdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - osint-net

  # ---------------------------------------------------------------------------
  # ArkhamMirror — документальна розвідка
  # ---------------------------------------------------------------------------
  arkham:
    build:
      context: ./arkham
      dockerfile: Dockerfile
    image: arkham-osint:local
    container_name: osint-arkham
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgresql://arkham:arkhampass@postgres:5432/arkhamdb
      LLM_ENDPOINT: http://host.docker.internal:11434/v1
      LLM_API_KEY: ollama
      EMBED_MODEL: all-MiniLM-L6-v2
      ARKHAM_SERVE_SHELL: "true"
      AUTH_SECRET_KEY: osint-course-local-dev-key-2026
      OCR_DEFAULT_LANGUAGE: "uk"
    volumes:
      - arkham_datasilo:/app/data_silo
      - ./arkham/config/shattered.yaml:/app/config/shattered.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - osint-net

  # ---------------------------------------------------------------------------
  # MindsDB — SQL + AI агенти поверх даних Arkham
  # ---------------------------------------------------------------------------
  mindsdb:
    image: mindsdb/mindsdb:latest
    container_name: osint-mindsdb
    restart: unless-stopped
    ports:
      - "47334:47334"
      - "47335:47335"
    volumes:
      - mindsdb_data:/root/mindsdb_storage
    environment:
      MINDSDB_DOCKER_ENV: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - osint-net
